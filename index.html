<!DOCTYPE html> <!-- Thẻ mở , thẻ đóng-->
<html>
    <head>
        <title>F8 - example</title>
        <meta charset="utf-8">
        <!-- <style>
            h1 {
                color:fuchsia;
                font-size: 30 px; 
            }
        </style> -->
        <!-- stylesheet = css-->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!--h = Header-->
        <h1 title="Header nè" id = "id1">header 1</h1>
        <h1 class = "class1">header 2 </h1>
        <h1 class = "class1">header 3</h1>
        <h1 class = "class1">header 5</h1>
        <!-- 
        <h2>2</h2>
        <h3>3</h3>
        <h4>4</h4>
        <h5>5</h5>
        <h6>6</h6> -->

        <!-- type = text, check box, radio-->
        <input type="text" name="Ô input" id="">
        <!--p = paragraph-->
        <p>
            Đây là đoạn văn
        </p>

        <!--img = image-->
        <img src="" alt="Đây là ảnh">

        <!--a = Link-->
        <a href="https://www.facebook.com/groups/1494144187551551"> Dai De Dong</a>

        <!--ul = dot list       ol = number list-->
        <ul>
            <li> Con ga con</li>
            <li> Con ga cha</li>
        </ul>
        <!-- Thẻ div = frame-->
        <div>
            <!--table-->
            <table>
                <thead>
                    <th>table header 1</th>
                    <th>table header 2</th>
                </thead>
                <tbody>
                    <!-- tr = table rows mỗi cặp 1 dòng-->
                    <tr> 
                        <!-- Thẻ td ứng với th-->
                        <td> 1 </td>
                        <td> cột 2</td>
                    </tr>

                </tbody>
            </table>
            <button>Nút gì đó</button>
        </div>

        <!--Có 3 cách sử dụng CSS là internal external và inline-->
        <!--Internal viết chung trong html, thẻ style-->
        <!--External viết ra ngoài 1 file css.-->
        <!--Internal viết chung trong từng thẻ theo dạng atribute.-->        
    </body>
</html>
